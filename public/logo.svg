<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- grabbit mascot: chubby frog snagging a note with its tongue (sticker style) -->
  <g stroke="#163f27" stroke-width="12" stroke-linejoin="round" style="paint-order:stroke">

    <!-- haunches -->
    <ellipse cx="105" cy="415" rx="78" ry="52" fill="#3da85a" />
    <ellipse cx="365" cy="415" rx="78" ry="52" fill="#3da85a" />

    <!-- feet -->
    <ellipse cx="95" cy="470" rx="50" ry="16" fill="#4fbe6b" />
    <ellipse cx="375" cy="470" rx="50" ry="16" fill="#4fbe6b" />

    <!-- body -->
    <ellipse cx="235" cy="352" rx="168" ry="130" fill="#4fbe6b" />

    <!-- belly (no outline, soft inset) -->
    <ellipse cx="235" cy="402" rx="105" ry="72" fill="#d6f2b0" stroke="none" />

    <!-- eye domes -->
    <circle cx="155" cy="235" r="62" fill="#4fbe6b" />
    <circle cx="315" cy="235" r="62" fill="#4fbe6b" />

    <!-- eyes -->
    <circle cx="155" cy="235" r="40" fill="#ffffff" stroke-width="9" />
    <circle cx="315" cy="235" r="40" fill="#ffffff" stroke-width="9" />
    <circle cx="167" cy="223" r="17" fill="#1c2b22" stroke="none" />
    <circle cx="327" cy="223" r="17" fill="#1c2b22" stroke="none" />
    <circle cx="173" cy="217" r="6" fill="#ffffff" stroke="none" />
    <circle cx="333" cy="217" r="6" fill="#ffffff" stroke="none" />

    <!-- nostrils -->
    <circle cx="215" cy="264" r="5" fill="#163f27" stroke="none" />
    <circle cx="255" cy="264" r="5" fill="#163f27" stroke="none" />

    <!-- mouth -->
    <path d="M105 292 Q 235 340 365 292" fill="none" stroke-width="11" stroke-linecap="round" />

    <!-- tongue: dark understroke, pink overstroke; exits the right mouth corner -->
    <ellipse cx="356" cy="297" rx="15" ry="10" fill="#163f27" stroke="none" transform="rotate(-24 356 297)" />
    <path d="M352 298 C 402 292 424 218 434 148" fill="none" stroke="#163f27" stroke-width="40" stroke-linecap="round" />
    <path d="M352 298 C 402 292 424 218 434 148" fill="none" stroke="#f76a8e" stroke-width="26" stroke-linecap="round" />

    <!-- music note, drawn on top so it sits stuck on the tongue tip -->
    <g fill="#f4f5f7" transform="rotate(-12 445 122)">
      <rect x="452" y="42" width="13" height="78" rx="6.5" />
      <path d="M458 40 C 492 50 500 78 492 104 C 488 82 478 68 458 62 Z" />
      <ellipse cx="445" cy="122" rx="26" ry="19" transform="rotate(-20 445 122)" />
    </g>
  </g>
</svg>
